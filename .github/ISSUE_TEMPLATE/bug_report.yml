name: Bug Report
description: Report a bug in Plexus UI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: cli-version
    attributes:
      label: CLI Version
      description: Output of `npx plexusui --version`
      placeholder: "0.0.24"
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework
      description: Your React/Next.js version
      placeholder: "React 19 / Next.js 15"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: renderer
    attributes:
      label: Renderer
      description: Which rendering backend?
      options:
        - WebGPU
        - WebGL2
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Minimal code to reproduce the issue
      render: tsx
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Output
      description: Any relevant browser console errors
      render: text
