name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this feature solve? What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include example code or mockup if applicable.
      render: tsx

  - type: checkboxes
    id: components
    attributes:
      label: Related Components
      description: Which component categories does this relate to?
      options:
        - label: Charts (Line, Area, Bar, Scatter, Histogram)
        - label: 3D (Point Cloud, Model Viewer)
        - label: Instruments (Attitude Indicator, Radar)
        - label: Data (Grid, Gantt)
        - label: Interactive (Annotations, Ruler, Regions)
        - label: CLI tooling
        - label: New component

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to your project?
      options:
        - Nice to have
        - Important — working around it today
        - Critical — blocking my project
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
